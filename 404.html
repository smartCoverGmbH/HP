<style>
  :root{
    --black:#010101; --white:#FEFEFE; --muted:#9AA0A0; --line:rgba(254,254,254,0.16); --stamp:#B23A2E;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:var(--black); color:var(--white); font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    display:flex; align-items:center; justify-content:center;
    text-align:center; padding:24px;
  }
  .box img{ height:64px; width:auto; margin:0 auto 34px; opacity:.95; }
  .code{
    font-family:var(--mono); font-size:clamp(80px,18vw,150px); font-weight:600;
    line-height:1; letter-spacing:-0.04em; color:var(--white);
  }
  .code span{ color:var(--stamp); }
  h1{ font-size:clamp(18px,3vw,24px); font-weight:700; margin:22px 0 12px; letter-spacing:-0.01em; }
  p{ font-size:15px; line-height:1.7; color:var(--muted); max-width:44ch; margin:0 auto 36px; }
  .cta{
    font-family:var(--mono); font-size:14px; letter-spacing:0.03em;
    padding:14px 26px; border-radius:999px; text-decoration:none;
    background:var(--white); color:var(--black); display:inline-block;
    transition:background .2s, color .2s;
  }
  .cta:hover{ background:var(--stamp); color:var(--white); }
</style>
